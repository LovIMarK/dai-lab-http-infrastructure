version: '3.8'

#TODO pk ca marche pas ??

services:
  # Serveur statique
  static-web:
    build: ./static-web-server
    deploy:
      replicas: 3
    labels:
      - traefik.http.routers.static-web.rule=PathPrefix(`/static`)
      - traefik.http.routers.static-web.entrypoints=http,https
      - traefik.http.routers.static-web.tls=true
      - traefik.http.services.static-web.loadbalancer.server.port=80

  # Serveur API
  todolist-api:
    build: ./todolist-api
    deploy:
      replicas: 3
    labels:
      - traefik.http.routers.todolist-api.rule=PathPrefix(`/api`)
      - traefik.http.routers.todolist-api.entrypoints=http,https
      - traefik.http.routers.todolist-api.tls=true
      - traefik.http.services.todolist-api.loadbalancer.server.port=7000

  # Traefik - Proxy inverse
  reverse_proxy:
    image: traefik
    container_name: reverse_proxy
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Tableau de bord
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./traefik/traefik.yaml:/etc/traefik/traefik.yaml"
      - "./traefik/certificates:/etc/traefik/certificates"
